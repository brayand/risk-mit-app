<body>
  <div id="root"></div>

    const { useState, useEffect, useCallback } = React;

    // Use local Vite proxy in local dev; use hosted backend elsewhere.
    const API_BASE = (["localhost", "127.0.0.1"].includes(window.location.hostname))
      ? ""
      : "https://risk-mit-app.onrender.com";
    const API = API_BASE;


// ─── CONFIG ───────────────────────────────────────────────────────────────────


// ─── API CLIENT ───────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  try {
    const res = await fetch(`${API}${path}`, {
      headers: { "Content-Type": "application/json" },
      ...opts,
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.error(`API error ${path}:`, e);
    return null;
  }
}

function useApi(path, deps = []) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const fetch_ = useCallback(async () => {
    setLoading(true); setError(null);
    const result = await api(path);
    if (result) setData(result); else setError("Failed to load");
    setLoading(false);
  }, [path]);
  useEffect(() => { fetch_(); }, deps);
  return { data, loading, error, refetch: fetch_ };
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
const fmtM = (n) => {
  if (!n && n !== 0) return "—";
  if (Math.abs(n) >= 1e9) return `$${(n/1e9).toFixed(2)}B`;
  if (Math.abs(n) >= 1e6) return `$${(n/1e6).toFixed(1)}M`;
  return `$${n.toLocaleString()}`;
};
const fmtN = (n, d=0) => n?.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})??"—";
const withVar = (v, variance, formatter=fmtM) => {
  if (v == null) return "—";
  const base = formatter(v);
  if (variance == null || variance === 0) return base;
  return `${base} +/- ${formatter(variance)}`;
};
const withVarNum = (v, variance, d=2) => {
  if (v == null) return "—";
  const base = Number(v).toFixed(d);
  if (variance == null || variance === 0) return base;
  return `${base} +/- ${Number(variance).toFixed(d)}`;
};
const riskColor = (s) => s >= 80 ? "#e85d5d" : s >= 60 ? "#f0a040" : "#4caf82";
const typeColor = (t) => t === "Geothermal" ? "#4ecdc4" : t === "Nuclear SMR" ? "#a78bfa" : "#f59e0b";
const typeIcon  = (t) => t === "Geothermal" ? "⬡" : t === "Nuclear SMR" ? "◎" : "▣";
const T = {
  bg:"#070b14", surface:"#0c1220", border:"#16213a", borderHi:"#1e2f50",
  text:"#dde3f5", textDim:"#3d4f72", textMid:"#7a8fba",
  mono:"'IBM Plex Mono', monospace", serif:"'Cormorant Garamond', serif",
};

const SOURCE_INFO = {
  portfolio_calc: { from: "Derived from project register and risk engine outputs.", section: "risk-model", sectionLabel: "Risk Register" },
  risk_engine: { from: "Computed by risk engine (factor scores + Monte Carlo losses).", section: "risk-model", sectionLabel: "Risk Register" },
  naic_calc: { from: "Calculated in NAIC RBC workflow from modeled losses/exposures.", section: "naic", sectionLabel: "NAIC RBC" },
  financial_model: { from: "Calculated from project financial assumptions and 10-year projection logic.", section: "financial-models", sectionLabel: "Financial Models" },
  correlation_calc: { from: "Computed from factor correlation assumptions and project-profile similarity.", section: "correlation", sectionLabel: "Correlations" },
};

function SourceHint({sourceKey, children}) {
  const src = SOURCE_INFO[sourceKey];
  if (!src) return <>{children}</>;
  const onNavigate = (e) => {
    e.preventDefault();
    window.dispatchEvent(new CustomEvent("navigate-section", { detail: { section: src.section } }));
  };
  return (
    <span className="src-wrap" style={{position:"relative",display:"inline-flex",alignItems:"center",gap:6}}>
      <span>{children}</span>
      <span style={{fontSize:9,color:"#4ecdc4",border:"1px solid #1e3f49",borderRadius:10,padding:"0 5px",lineHeight:"14px"}}>i</span>
      <span className="src-box" style={{position:"absolute",left:0,top:"110%",zIndex:50,minWidth:250,maxWidth:320,background:"#08101d",border:`1px solid ${T.borderHi}`,borderRadius:6,padding:"8px 10px",opacity:0,pointerEvents:"none",transform:"translateY(4px)",transition:"all 0.12s"}}>
        <div style={{fontSize:10,color:T.textMid,fontFamily:T.mono,lineHeight:1.5,marginBottom:8}}>{src.from}</div>
        <button onClick={onNavigate} style={{fontSize:10,padding:"5px 8px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:4,color:"#4ecdc4",cursor:"pointer",fontFamily:T.mono}}>
          Open {src.sectionLabel}
        </button>
      </span>
    </span>
  );
}

// ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
const Card = ({children,style}) => <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:24,...style}}>{children}</div>;
const Label = ({children}) => <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",color:T.textDim,marginBottom:8,fontFamily:T.mono}}>{children}</div>;
const Spinner = () => <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:60}}><div style={{width:24,height:24,border:`2px solid ${T.border}`,borderTopColor:"#4ecdc4",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>;
const Tag = ({children,color="#4a5580"}) => <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:`${color}18`,color,border:`1px solid ${color}30`,fontFamily:T.mono,letterSpacing:1}}>{children}</span>;
const Th = ({children}) => <th style={{padding:"8px 10px",color:T.textDim,fontSize:10,textTransform:"uppercase",letterSpacing:1,textAlign:"left",fontWeight:500,fontFamily:T.mono,borderBottom:`1px solid ${T.border}`}}>{children}</th>;
const Td = ({children,mono,color,sourceKey}) => <td style={{padding:"11px 10px",color:color||T.textMid,fontFamily:mono?T.mono:undefined,borderBottom:`1px solid ${T.bg}`,fontSize:12}}><SourceHint sourceKey={sourceKey}>{children}</SourceHint></td>;
const PageDescription = ({children}) => (
  <Card style={{marginBottom:16,padding:"14px 18px",background:"#091325",borderColor:T.borderHi}}>
    <div style={{fontSize:11,color:T.textMid,fontFamily:T.mono,lineHeight:1.7}}>{children}</div>
  </Card>
);

function KPI({label,value,sub,color,loading,sourceKey}) {
  return (
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"18px 22px",flex:1,minWidth:130}}>
      <Label>{label}</Label>
      {loading
        ? <div style={{height:32,background:T.border,borderRadius:4,width:"70%",animation:"pulse 1.5s infinite"}}/>
        : <div style={{fontSize:24,fontWeight:700,color:color||T.text,fontFamily:T.serif,letterSpacing:-0.5}}><SourceHint sourceKey={sourceKey}>{value}</SourceHint></div>}
      {sub && <div style={{fontSize:11,color:T.textDim,marginTop:4,fontFamily:T.mono}}>{sub}</div>}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard() {
  const {data:portfolio,loading} = useApi("/api/risk/portfolio");
  const {data:naic}              = useApi("/api/naic/summary");
  const {data:projects}          = useApi("/api/projects");
  const {data:interCorr}         = useApi("/api/risk/correlation/between-projects");
  const ps = projects?.projects||[];
  const totalCapex = ps.reduce((s,p)=>s+p.capex,0);
  const totalMW    = ps.reduce((s,p)=>s+p.mw,0);
  const byType = ps.reduce((acc,p)=>{
    if(!acc[p.type]) acc[p.type]={count:0,capex:0};
    acc[p.type].count++; acc[p.type].capex+=p.capex; return acc;
  },{});
  const frontierInput = (portfolio?.projects||[]).map((pr,i)=>{
    const p = ps[i];
    if(!p) return null;
    const ebitda = p.financial_model?.metrics?.annual_ebitda_usd;
    const retPct = (p.capex>0 && ebitda!=null) ? (ebitda/p.capex)*100 : null;
    const eal = pr.losses?.eal;
    const var99 = pr.losses?.var_99;
    // Dollar risk expressed as a symmetric +/- band around expected loss.
    const riskBandUsd = (eal!=null && var99!=null) ? Math.max(var99 - eal, 0) : null;
    if(retPct==null || riskBandUsd==null) return null;
    return { id:p.id, name:p.name, type:p.type, riskUsd:+riskBandUsd, ret:+retPct };
  }).filter(Boolean);
  const sortedPts = [...frontierInput].sort((a,b)=>a.riskUsd-b.riskUsd);
  let bestRet = -Infinity;
  const efficientPts = sortedPts.filter((pt)=>{
    if(pt.ret > bestRet){ bestRet = pt.ret; return true; }
    return false;
  });
  // Simulated portfolio make-ups (long-only, fully invested) using project-to-project correlation.
  const portfolios = [];
  if (sortedPts.length >= 2) {
    const n = sortedPts.length;
    const corr = (interCorr?.matrix && interCorr.matrix.length===n) ? interCorr.matrix : null;
    const idToIdx = Object.fromEntries(sortedPts.map((p,i)=>[p.id,i]));
    const mu = sortedPts.map((p)=>p.ret);
    const sigma = sortedPts.map((p)=>Math.max(p.riskUsd, 1));
    const samples = 220;
    for (let s=0; s<samples; s++) {
      // Random simplex weights via normalized exponentials.
      let wRaw = Array.from({length:n}, ()=> -Math.log(Math.max(1e-9, Math.random())));
      const sumW = wRaw.reduce((a,b)=>a+b,0) || 1;
      const w = wRaw.map((x)=>x/sumW);
      const ret = w.reduce((acc,wi,i)=>acc + wi*mu[i], 0);
      let varRisk = 0;
      for (let i=0;i<n;i++){
        for (let j=0;j<n;j++){
          const cij = corr ? (corr[idToIdx[sortedPts[i].id]]?.[idToIdx[sortedPts[j].id]] ?? (i===j?1:0.35)) : (i===j?1:0.35);
          varRisk += w[i]*w[j]*sigma[i]*sigma[j]*cij;
        }
      }
      const riskUsd = Math.sqrt(Math.max(varRisk, 0));
      const top = [...w.map((wi,i)=>({wi,i}))].sort((a,b)=>b.wi-a.wi).slice(0,3);
      const mix = top.map((t)=>`${sortedPts[t.i].name.split(" ").slice(0,2).join(" ")} ${Math.round(t.wi*100)}%`).join(", ");
      portfolios.push({ riskUsd, ret, mix });
    }
  }
  const portfolioSorted = [...portfolios].sort((a,b)=>a.riskUsd-b.riskUsd);
  let bestPortRet = -Infinity;
  const efficientPortfolios = portfolioSorted.filter((pt)=>{
    if (pt.ret > bestPortRet) { bestPortRet = pt.ret; return true; }
    return false;
  });
  const allRiskVals = [...sortedPts.map((p)=>p.riskUsd), ...portfolios.map((p)=>p.riskUsd)];
  const allRetVals = [...sortedPts.map((p)=>p.ret), ...portfolios.map((p)=>p.ret)];
  const capexWeights = ps.map((p)=>p.capex || 0);
  const capexTotal = capexWeights.reduce((a,b)=>a+b,0) || 1;
  const normalizedW = capexWeights.map((w)=>w/capexTotal);
  const currentRet = sortedPts.length
    ? sortedPts.reduce((acc,p,idx)=>acc + (normalizedW[idx] || 0)*p.ret, 0)
    : null;
  const currentRiskUsd = (portfolio?.total_var99_net!=null && portfolio?.total_eal!=null)
    ? Math.max((portfolio.total_var99_net - portfolio.total_eal), 0)
    : null;
  const currentPortfolioPoint = (currentRet!=null && currentRiskUsd!=null)
    ? { riskUsd: currentRiskUsd, ret: currentRet }
    : null;
  if (currentPortfolioPoint) {
    allRiskVals.push(currentPortfolioPoint.riskUsd);
    allRetVals.push(currentPortfolioPoint.ret);
  }
  const minRiskUsd = allRiskVals.length ? Math.min(...allRiskVals) : 0;
  const maxRiskUsd = allRiskVals.length ? Math.max(...allRiskVals) : 100;
  const minRet  = allRetVals.length ? Math.min(...allRetVals) : 0;
  const maxRet  = allRetVals.length ? Math.max(...allRetVals) : 10;
  const xPad = Math.max((maxRiskUsd - minRiskUsd) * 0.08, 100000);
  const yPad = 1;
  const x0 = minRiskUsd - xPad, x1 = maxRiskUsd + xPad;
  const y0 = minRet - yPad, y1 = maxRet + yPad;
  const sx = (v)=> 70 + ((v - x0) / Math.max(x1 - x0, 1e-9)) * 640;
  const sy = (v)=> 250 - ((v - y0) / Math.max(y1 - y0, 1e-9)) * 190;
  const efPath = efficientPts.map((p,idx)=> `${idx===0?"M":"L"} ${sx(p.riskUsd).toFixed(1)} ${sy(p.ret).toFixed(1)}`).join(" ");
  const pfPath = efficientPortfolios.map((p,idx)=> `${idx===0?"M":"L"} ${sx(p.riskUsd).toFixed(1)} ${sy(p.ret).toFixed(1)}`).join(" ");

  return (
    <div>
      <div style={{marginBottom:28}}>
        <Label>Portfolio Overview</Label>
        <h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0 6px",letterSpacing:-1}}>Risk Dashboard</h1>
        <p style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Storage · Nuclear SMR · Geothermal — NAIC RBC — Live Pipeline Data</p>
      </div>
      <PageDescription>
        This dashboard summarizes portfolio-level exposure and loss outcomes using live project records plus synced external data. It combines project counts, capital at risk, expected annual loss, and NAIC capital requirements so you can see where risk is concentrated before drilling into model details.
      </PageDescription>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
        <KPI label="Projects"        value={ps.length}                         sub="In portfolio"       loading={loading} sourceKey="portfolio_calc"/>
        <KPI label="Total Capacity"  value={`${fmtN(totalMW)} MW`}            sub="All technologies"   loading={loading} sourceKey="portfolio_calc"/>
        <KPI label="Total CapEx"     value={fmtM(totalCapex)}                  sub="Gross exposure"     loading={loading} sourceKey="portfolio_calc"/>
        <KPI label="Portfolio EAL"   value={fmtM(portfolio?.total_eal)}        sub="Expected ann. loss" color="#f0a040" loading={loading} sourceKey="risk_engine"/>
        <KPI label="VaR 99% (net)"   value={fmtM(portfolio?.total_var99_net)}  sub="Post-diversif."     color="#e85d5d" loading={loading} sourceKey="risk_engine"/>
        <KPI label="NAIC RBC"        value={fmtM(naic?.portfolio_rbc_net)}     sub="Capital required"   color="#a78bfa" loading={loading} sourceKey="naic_calc"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <Card>
          <Label>Exposure by Technology</Label>
          {loading ? <Spinner/> : Object.entries(byType).map(([type,d])=>(
            <div key={type} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:12,color:typeColor(type),fontFamily:T.mono}}>{typeIcon(type)} {type}</span>
                <span style={{fontSize:11,color:T.textDim,fontFamily:T.mono}}><SourceHint sourceKey="portfolio_calc">{fmtM(d.capex)}</SourceHint></span>
              </div>
              <div style={{height:4,background:T.border,borderRadius:2}}>
                <div style={{height:4,width:`${(d.capex/totalCapex)*100}%`,background:typeColor(type),borderRadius:2,opacity:0.85}}/>
              </div>
            </div>
          ))}
        </Card>
        <Card>
          <Label>NAIC RBC by Project</Label>
          {!naic ? <Spinner/> : <>
            {naic.projects.map((p,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${T.bg}`}}>
                <div>
                  <div style={{fontSize:11,color:T.text}}>{p.name.split(" ").slice(0,3).join(" ")}</div>
                  <div style={{fontSize:10,color:T.textDim,marginTop:2}}>{p.type} · {p.state}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:13,color:"#a78bfa",fontFamily:T.mono,fontWeight:600}}><SourceHint sourceKey="naic_calc">{fmtM(p.rbc_total)}</SourceHint></div>
                  <div style={{fontSize:10,color:riskColor(p.composite),fontFamily:T.mono}}><SourceHint sourceKey="risk_engine">Score: {p.composite}</SourceHint></div>
                </div>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",paddingTop:8}}>
              <span style={{fontSize:12,color:T.text,fontWeight:600}}>Total RBC Required</span>
              <span style={{fontSize:16,color:"#a78bfa",fontFamily:T.mono,fontWeight:700}}><SourceHint sourceKey="naic_calc">{fmtM(naic.portfolio_rbc_net)}</SourceHint></span>
            </div>
          </>}
        </Card>
      </div>
      <Card style={{marginBottom:14}}>
        <Label>Efficient Frontier (Risk vs Return)</Label>
        <div style={{fontSize:11,color:T.textDim,fontFamily:T.mono,marginBottom:10}}>
          X-axis: risk as +/- dollar band (VaR99 - EAL) · Y-axis: annual EBITDA / CapEx (%) · includes single-project points plus possible portfolio make-ups.
        </div>
        {sortedPts.length===0 ? <Spinner/> : (
          <svg viewBox="0 0 780 290" style={{width:"100%",height:290,background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}}>
            <line x1="70" y1="250" x2="730" y2="250" stroke={T.borderHi} />
            <line x1="70" y1="30" x2="70" y2="250" stroke={T.borderHi} />
            <text x="730" y="270" fill={T.textDim} fontSize="10" textAnchor="end">Risk (+/- USD)</text>
            <text x="18" y="24" fill={T.textDim} fontSize="10">Return %</text>
            <text x="70" y="270" fill={T.textDim} fontSize="9">{`+/- ${fmtM(minRiskUsd)}`}</text>
            <text x="730" y="270" fill={T.textDim} fontSize="9" textAnchor="end">{`+/- ${fmtM(maxRiskUsd)}`}</text>
            <text x="58" y="250" fill={T.textDim} fontSize="9" textAnchor="end">{minRet.toFixed(1)}%</text>
            <text x="58" y="40" fill={T.textDim} fontSize="9" textAnchor="end">{maxRet.toFixed(1)}%</text>
            {efPath && <path d={efPath} fill="none" stroke="#4ecdc4" strokeWidth="2.5" />}
            {pfPath && <path d={pfPath} fill="none" stroke="#f0a040" strokeWidth="2" strokeDasharray="4 3" />}
            {portfolios.map((p,idx)=>(
              <g key={`pf-${idx}`}>
                <circle cx={sx(p.riskUsd)} cy={sy(p.ret)} r="2.8" fill="#f0a040" opacity="0.5" />
                <title>{`Portfolio mix: ${p.mix} | risk +/- ${fmtM(p.riskUsd)}, return ${p.ret.toFixed(2)}%`}</title>
              </g>
            ))}

function AddProject({onProjectAdded}) {
  const [form,setForm] = useState({name:"",type:"Geothermal",state:"NV",mw:"",capex:"",offtake:"PPA-Utility",status:"Development"});
  const [submitting,setSubmitting] = useState(false);
  const [done,setDone] = useState(null);
  const [dataRoomFiles,setDataRoomFiles] = useState([]);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const STATES = ["AK","AL","AR","AZ","CA","CO","CT","DE","FL","GA","HI","IA","ID","IL","IN","KS","KY","LA","MA","MD","ME","MI","MN","MO","MS","MT","NC","ND","NE","NH","NJ","NM","NV","NY","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VA","VT","WA","WI","WV","WY"];
  const submit = async () => {
    if(!form.name||!form.mw||!form.capex) return;
    setSubmitting(true);
    const result = await api("/api/projects",{method:"POST",body:JSON.stringify({...form,mw:parseFloat(form.mw),capex:parseFloat(form.capex)})});
    setSubmitting(false);
    if(result){setDone(result.project);onProjectAdded?.();}
  };
  const Field = ({label,field,type="text",options}) => (
    <div style={{marginBottom:18}}>
      <Label>{label}</Label>
      {options
        ? <select value={form[field]} onChange={e=>set(field,e.target.value)} style={{width:"100%",padding:"10px 12px",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,fontFamily:T.mono}}>

          </select>
        : <input type={type} value={form[field]} onChange={e=>set(field,e.target.value)} style={{width:"100%",padding:"10px 12px",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,fontFamily:T.mono,boxSizing:"border-box"}}/>}

  );
  if(done) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:400,gap:16}}>
      <div style={{fontSize:48,color:"#4caf82"}}>✓</div>
      <div style={{color:T.text,fontSize:20,fontFamily:T.serif}}>Project Added Successfully</div>
      <div style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>{done.name} · {done.type} · {done.state}</div>
      <button onClick={()=>{setDone(null);setForm({name:"",type:"Geothermal",state:"NV",mw:"",capex:"",offtake:"PPA-Utility",status:"Development"});}} style={{marginTop:12,padding:"10px 28px",background:"transparent",border:"1px solid #4ecdc4",color:"#4ecdc4",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:T.mono,letterSpacing:1}}>ADD ANOTHER</button>
    </div>
  );
  return (
    <div>

      </PageDescription>
      <Card style={{maxWidth:680}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 28px"}}>

function FinancialModels() {
  const {data,loading} = useApi("/api/financial-models");
  const {data:portfolioRisk,loading:loadingRisk} = useApi("/api/risk/portfolio");
  const {data:projectsData} = useApi("/api/projects");
  const [sel,setSel] = useState(0);
  const models = data?.models || [];
  const selected = models[sel];
  const fm = selected?.financial_model || {};
  const assumptions = fm.assumptions || {};
  const metrics = fm.metrics || {};
  const rows = fm.yearly_projection || [];
  const riskRows = portfolioRisk?.projects || [];
  const selectedRisk = riskRows[sel];
  const projectRows = projectsData?.projects || [];
  const selectedProject = projectRows.find((p)=>p.id===selected?.project_id) || null;
  const subcomponents = selectedProject?.correlation_subcomponents || {};
  const engineeringSubs = Object.entries(subcomponents).filter(([,v])=>
    ["technology","construction","operational"].includes(v.parent_factor)
  ).slice(0,12);
  const riskParents = ["technology","regulatory","construction","counterparty","physical","financial","operational","workforce"];
  const riskParentMeasures = riskParents.map((k)=>({
    key:k,
    label:k.replace("_"," ").replace(/\b\w/g, c=>c.toUpperCase()),
    value:selectedRisk?.scores?.[k]
  }));
  const capex = selectedProject?.capex || 0;
  const debtRatio = assumptions.debt_ratio ?? 0.6;
  const equityRatio = Math.max(0, 1 - debtRatio);
  const debtPrincipal = metrics.debt_principal_usd ?? capex * debtRatio;
  const equityCapital = metrics.equity_usd ?? capex * equityRatio;
  const annualRevenue = metrics.annual_revenue_usd || 0;
  const annualEbitda = metrics.annual_ebitda_usd || 0;
  const annualDebtService = metrics.annual_debt_service_usd || 0;
  const annualEal = selectedRisk?.losses?.eal || 0;
  const annualVar99 = selectedRisk?.losses?.var_99 || 0;
  const insurancePremium = annualEal * 0.35;
  const insuredLimit = annualVar99 * 0.6;
  const taxEquityCapital = capex * 0.12;
  const taxBenefit = annualEbitda * 0.08;
  const carbonPricePerMwh = 22;
  const carbonCreditRevenue = (metrics.annual_generation_mwh || 0) * carbonPricePerMwh;
  const carbonBuyerCapital = carbonCreditRevenue * 0.75;
  const stakeholderRows = [
    {
      stakeholder: "Equity Investors",
      capitalIn: equityCapital,
      riskExposure: Math.max(0, annualVar99 - debtPrincipal * 0.05),
      upside: Math.max(0, annualEbitda - annualDebtService),
      mechanism: "Residual cash flow and terminal value after debt service."
    },
    {
      stakeholder: "Loan Providers",
      capitalIn: debtPrincipal,
      riskExposure: debtPrincipal * 0.25,
      upside: annualDebtService - (metrics.annual_principal_usd || 0),
      mechanism: "Contractual interest and principal payments."
    },
    {
      stakeholder: "Insurance Providers",
      capitalIn: insuredLimit,
      riskExposure: insuredLimit,
      upside: insurancePremium,
      mechanism: "Premium income in exchange for catastrophe/operational coverage."
    },
    {
      stakeholder: "Tax Equity Holders",
      capitalIn: taxEquityCapital,
      riskExposure: taxEquityCapital * 0.7,
      upside: taxBenefit,
      mechanism: "Monetized tax credits and depreciation allocations."
    },
    {
      stakeholder: "Carbon Credit Buyers",
      capitalIn: carbonBuyerCapital,
      riskExposure: carbonBuyerCapital * 0.35,
      upside: carbonCreditRevenue,
      mechanism: "Contracted purchase of environmental attributes/credits."
    }
  ];

  return (
    <div>
      <div style={{marginBottom:28}}>
        <Label>Project Finance</Label>
        <h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Project Details</h1>

          {models.map((m,i)=>(
            <button key={m.project_id} onClick={()=>setSel(i)} style={{padding:"7px 16px",borderRadius:20,border:`1px solid ${sel===i?typeColor(m.project_type):T.border}`,background:sel===i?`${typeColor(m.project_type)}15`:"transparent",color:sel===i?typeColor(m.project_type):T.textDim,fontSize:11,cursor:"pointer",fontFamily:T.mono}}>

// ─── CORRELATION ─────────────────────────────────────────────────────────────
function CorrelationMatrix() {
  const {data,loading} = useApi("/api/risk/correlation");
  const {data: inter, loading: interLoading} = useApi("/api/risk/correlation/between-projects");
  const [selParent,setSelParent] = useState(0);

  const corrColor = (v) => { const r=Math.round(255*v),b=Math.round(255*(1-v)); return `rgba(${r},70,${b},${0.25+v*0.75})`; };
  const parentEntries = Object.entries(data?.grouped_matrices || {});
  const activeParent = parentEntries[selParent]?.[0];
  const activeGroup = parentEntries[selParent]?.[1];

  return (
    <div>
      <div style={{marginBottom:28}}><Label>Dependency Structure</Label><h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Correlation Matrix</h1><p style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Pearson correlations · t-Copula (ν=4) · used in Monte Carlo simulation</p></div>
      <PageDescription>
        The matrix shows how project risk factors move together instead of independently. These dependency assumptions are applied in simulation to produce portfolio-level VaR and TVaR that reflect diversification and concentration effects.
      </PageDescription>
      {loading ? <Spinner/> : (
        <Card style={{overflowX:"auto"}}>
          <Label>Portfolio (baseline)</Label>
          <table style={{borderCollapse:"collapse",fontSize:10,fontFamily:T.mono,marginTop:10}}>
            <thead><tr>
              <th style={{width:120}}/>
              {(data?.labels||[]).map((l,i)=>(
                <th key={i} style={{padding:"4px 2px",color:T.textDim,fontWeight:500,textAlign:"center",width:52}}>
                  <div style={{transform:"rotate(-40deg)",whiteSpace:"nowrap",transformOrigin:"bottom left",marginLeft:8,marginBottom:4,fontSize:9}}>{l}</div>
                </th>
              ))}
            </tr></thead>
            <tbody>
              {(data?.matrix||[]).map((row,i)=>(
                <tr key={i}>
                  <td style={{padding:"3px 12px 3px 0",color:T.textMid,textAlign:"right",fontSize:10,whiteSpace:"nowrap"}}>{data?.labels?.[i]}</td>
                  {row.map((v,j)=>(
                    <td key={j} style={{padding:2}}>
                      <div style={{width:46,height:30,display:"flex",alignItems:"center",justifyContent:"center",background:corrColor(v),borderRadius:3,color:v>0.5?"#fff":T.textMid,fontSize:10}}>
                        <SourceHint sourceKey="correlation_calc">{v.toFixed(2)}</SourceHint>
                      </div>
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}
      {!loading && data?.grouped_matrices && (
        <Card style={{marginTop:14}}>
          <Label>Parent Category Subcomponent Matrices</Label>
          <div style={{display:"flex",gap:8,marginTop:10,marginBottom:12,flexWrap:"wrap"}}>
            {parentEntries.map(([parent],i)=>(
              <button key={parent} onClick={()=>setSelParent(i)} style={{padding:"7px 14px",borderRadius:20,border:`1px solid ${selParent===i?"#4ecdc4":T.border}`,background:selParent===i?"#072020":"transparent",color:selParent===i?"#4ecdc4":T.textDim,fontSize:11,cursor:"pointer",fontFamily:T.mono,textTransform:"capitalize"}}>
                {parent.replace("_"," ")}
              </button>
            ))}
          </div>
          {activeGroup && (
            <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:10,overflowX:"auto"}}>
              <div style={{fontSize:11,color:T.text,fontFamily:T.mono,marginBottom:8,textTransform:"capitalize"}}>
                {activeParent?.replace("_"," ")}
              </div>
              <table style={{borderCollapse:"collapse",fontSize:10,fontFamily:T.mono}}>
                <thead><tr>
                  <th style={{width:130}}/>
                  {(activeGroup.labels||[]).map((l,i)=>(
                    <th key={i} style={{padding:"4px 6px",color:T.textDim,fontWeight:500,textAlign:"center"}}>
                      {l}
                    </th>
                  ))}
                </tr></thead>
                <tbody>
                  {(activeGroup.matrix||[]).map((row,i)=>(
                    <tr key={i}>
                      <td style={{padding:"4px 8px 4px 0",color:T.textMid,fontSize:10,whiteSpace:"nowrap"}}>{activeGroup.labels?.[i]}</td>
                      {row.map((v,j)=>(
                        <td key={j} style={{padding:2}}>
                          <div style={{width:62,height:26,display:"flex",alignItems:"center",justifyContent:"center",background:corrColor(v),borderRadius:3,color:v>0.55?"#fff":T.textMid,fontSize:10}}>
                            <SourceHint sourceKey="correlation_calc">{Number(v).toFixed(2)}</SourceHint>
                          </div>
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </Card>
      )}
      <Card style={{marginTop:14,overflowX:"auto"}}>
        <Label>Project-to-Project Correlation</Label>
        <p style={{fontSize:11,color:T.textDim,fontFamily:T.mono,marginTop:8,lineHeight:1.6}}>
          {inter?.method || "Implied co-movement between projects from aligned risk factor profiles, shared technology, and shared state exposure."}

                </th>
              ))}
            </tr></thead>
            <tbody>
              {(inter?.matrix||[]).map((row,i)=>(
                <tr key={i}>
                  <td style={{padding:"3px 10px 3px 0",color:T.textMid,textAlign:"right",fontSize:9,whiteSpace:"nowrap",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis"}} title={inter?.full_names?.[i]}>{inter?.labels?.[i]}</td>
                  {row.map((v,j)=>(
                    <td key={j} style={{padding:2}}>
                      <div style={{width:44,height:28,display:"flex",alignItems:"center",justifyContent:"center",background:corrColor(v),borderRadius:3,color:v>0.55?"#fff":T.textMid,fontSize:9}} title={`${inter?.full_names?.[i]} × ${inter?.full_names?.[j]}`}>
                        <SourceHint sourceKey="correlation_calc">{Number(v).toFixed(2)}</SourceHint>
                      </div>
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

// ─── SCENARIO ANALYSIS ────────────────────────────────────────────────────────
function ScenarioAnalysis() {
  const {data:naic,loading} = useApi("/api/naic/summary");
  const scenarios = [
    {name:"Base Case", ealFactor:1.00, varFactor:1.00, capFactor:1.00, note:"Current modeled portfolio profile."},
    {name:"Mild Stress", ealFactor:1.12, varFactor:1.18, capFactor:1.10, note:"Moderate claims escalation and spread widening."},
    {name:"Severe Stress", ealFactor:1.30, varFactor:1.42, capFactor:1.25, note:"Tail-risk concentration with adverse event clustering."},
  ];
  const rows = scenarios.map((s)=>{
    const eal = (naic?.portfolio_eal ?? 0) * s.ealFactor;
    const var99 = (naic?.portfolio_var99_net ?? 0) * s.varFactor;
    const capital = (naic?.portfolio_rbc_net ?? 0) * s.capFactor;
    const coverage = capital > 0 ? var99 / capital : null;
    return {...s,eal,var99,capital,coverage};
  });
  return (
    <div>
      <div style={{marginBottom:28}}>
        <Label>Analysis</Label>
        <h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Scenario Analysis</h1>
        <p style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Stress-tested view of loss and capital adequacy across portfolio scenarios</p>
      </div>
      <PageDescription>
        This section converts baseline portfolio outputs into stress scenarios so underwriting teams can compare expected loss, tail risk, and required capital under adverse conditions.
      </PageDescription>
      {loading ? <Spinner/> : <>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <KPI label="Baseline EAL" value={fmtM(naic?.portfolio_eal)} color="#f0a040" sourceKey="risk_engine"/>
          <KPI label="Baseline VaR 99%" value={fmtM(naic?.portfolio_var99_net)} color="#e85d5d" sourceKey="risk_engine"/>
          <KPI label="Baseline Capital" value={fmtM(naic?.portfolio_rbc_net)} color="#a78bfa" sourceKey="naic_calc"/>
          <KPI label="Divers. Benefit" value={`${naic?.diversification_pct ?? "—"}%`} color="#4caf82" sourceKey="naic_calc"/>
        </div>
        <Card>
          <Label>Scenario Table</Label>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["Scenario","Portfolio EAL","VaR 99% (net)","Required Capital","VaR/Capital","Interpretation"].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
            <tbody>
              {rows.map((r)=>(
                <tr key={r.name}>
                  <Td><span style={{color:T.text,fontWeight:500}}>{r.name}</span></Td>
                  <Td mono color="#f0a040" sourceKey="risk_engine">{fmtM(r.eal)}</Td>
                  <Td mono color="#e85d5d" sourceKey="risk_engine">{fmtM(r.var99)}</Td>
                  <Td mono color="#a78bfa" sourceKey="naic_calc">{fmtM(r.capital)}</Td>
                  <Td mono color={r.coverage==null ? T.textDim : r.coverage<=0.85 ? "#4caf82" : r.coverage<=1.0 ? "#f0a040" : "#e85d5d"} sourceKey="naic_calc">
                    {r.coverage==null ? "—" : `${fmtN(r.coverage,2)}x`}
                  </Td>
                  <Td><span style={{color:T.textDim,fontSize:11}}>{r.note}</span></Td>
                </tr>
              ))}

}

// ─── OPTIMIZED PORTFOLIO ──────────────────────────────────────────────────────
function OptimizedPortfolio() {
  const {data:portfolio,loading} = useApi("/api/risk/portfolio");
  const projects = portfolio?.projects || [];
  const scored = projects.map((p)=>({
    name: p.project_name,
    type: p.project_type,
    state: p.state,
    score: p.scores?.composite ?? 0,
    eal: p.losses?.eal ?? 0,
    var99: p.losses?.var_99 ?? 0,
    riskUsd: Math.max((p.losses?.var_99 ?? 0) - (p.losses?.eal ?? 0), 0),
    returnProxy: Math.max(0, 100 - (p.scores?.composite ?? 0)),
  }));
  const ranked = [...scored].sort((a,b)=>(a.score - b.score) || (a.eal - b.eal));
  const selected = ranked.slice(0, Math.min(5, ranked.length));
  const totalEal = selected.reduce((s,p)=>s+p.eal,0);
  const totalVar = selected.reduce((s,p)=>s+p.var99,0);
  const avgScore = selected.length ? selected.reduce((s,p)=>s+p.score,0) / selected.length : null;
  const baseAvgScore = scored.length ? scored.reduce((s,p)=>s+p.score,0) / scored.length : null;
  const improvement = (baseAvgScore!=null && avgScore!=null && baseAvgScore>0) ? ((baseAvgScore-avgScore)/baseAvgScore)*100 : null;
  const frontierPts = [...scored].sort((a,b)=>a.riskUsd-b.riskUsd);
  let bestRet = -Infinity;
  const efficientPts = frontierPts.filter((pt)=>{
    if (pt.returnProxy > bestRet) { bestRet = pt.returnProxy; return true; }
    return false;
  });
  const minRisk = frontierPts.length ? Math.min(...frontierPts.map((p)=>p.riskUsd)) : 0;
  const maxRisk = frontierPts.length ? Math.max(...frontierPts.map((p)=>p.riskUsd)) : 1;
  const minRet = frontierPts.length ? Math.min(...frontierPts.map((p)=>p.returnProxy)) : 0;
  const maxRet = frontierPts.length ? Math.max(...frontierPts.map((p)=>p.returnProxy)) : 100;
  const sx = (v)=>70 + ((v-minRisk)/Math.max(maxRisk-minRisk,1e-9))*660;
  const sy = (v)=>250 - ((v-minRet)/Math.max(maxRet-minRet,1e-9))*210;
  const efPath = efficientPts.map((p,idx)=>`${idx===0?"M":"L"} ${sx(p.riskUsd).toFixed(1)} ${sy(p.returnProxy).toFixed(1)}`).join(" ");

  return (
    <div>
      <div style={{marginBottom:28}}>
        <Label>Analysis</Label>
        <h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Optimized Portfolio</h1>
        <p style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Heuristic low-risk selection from current registered projects</p>
      </div>
      <PageDescription>
        This view creates a first-pass optimized subset by prioritizing lower composite risk and lower expected losses. It is intended as a decision-support shortlist before running full underwriting judgement.
      </PageDescription>
      {loading ? <Spinner/> : <>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <KPI label="Selected Projects" value={selected.length} color="#4ecdc4" sourceKey="portfolio_calc"/>
          <KPI label="Avg Composite Risk" value={avgScore==null ? "—" : fmtN(avgScore,1)} color={riskColor(avgScore||0)} sourceKey="risk_engine"/>
          <KPI label="Total EAL" value={fmtM(totalEal)} color="#f0a040" sourceKey="risk_engine"/>
          <KPI label="Total VaR 99%" value={fmtM(totalVar)} color="#e85d5d" sourceKey="risk_engine"/>
        </div>
        <Card style={{marginBottom:14}}>
          <Label>Efficient Frontier (Risk vs Resilience)</Label>
          <div style={{fontSize:11,color:T.textDim,fontFamily:T.mono,marginBottom:10}}>
            X-axis: risk as +/- dollar band (VaR99 - EAL) · Y-axis: resilience proxy (100 - composite risk).
          </div>
          {frontierPts.length===0 ? <Spinner/> : (
            <svg viewBox="0 0 780 290" style={{width:"100%",height:290,background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}}>
              <line x1="70" y1="250" x2="730" y2="250" stroke={T.borderHi} />
              <line x1="70" y1="30" x2="70" y2="250" stroke={T.borderHi} />
              <text x="730" y="270" fill={T.textDim} fontSize="10" textAnchor="end">Risk (+/- USD)</text>
              <text x="20" y="24" fill={T.textDim} fontSize="10">Resilience</text>
              <text x="70" y="270" fill={T.textDim} fontSize="9">{`+/- ${fmtM(minRisk)}`}</text>
              <text x="730" y="270" fill={T.textDim} fontSize="9" textAnchor="end">{`+/- ${fmtM(maxRisk)}`}</text>
              <text x="58" y="250" fill={T.textDim} fontSize="9" textAnchor="end">{fmtN(minRet,1)}</text>
              <text x="58" y="40" fill={T.textDim} fontSize="9" textAnchor="end">{fmtN(maxRet,1)}</text>
              {efPath && <path d={efPath} fill="none" stroke="#4ecdc4" strokeWidth="2.5" />}
              {frontierPts.map((p)=>(
                <g key={`${p.name}-${p.state}`}>
                  <circle cx={sx(p.riskUsd)} cy={sy(p.returnProxy)} r="5" fill={typeColor(p.type)} opacity="0.95" />
                  <title>{`${p.name}: risk +/- ${fmtM(p.riskUsd)}, resilience ${fmtN(p.returnProxy,1)}`}</title>
                </g>
              ))}
            </svg>
          )}
        </Card>
        <Card style={{marginBottom:14}}>
          <Label>Optimization Summary</Label>
          <div style={{fontSize:11,color:T.textMid,fontFamily:T.mono,lineHeight:1.7}}>
            Baseline portfolio average risk: <span style={{color:T.text}}>{baseAvgScore==null ? "—" : fmtN(baseAvgScore,1)}</span>{" · "}
            optimized subset average risk: <span style={{color:T.text}}>{avgScore==null ? "—" : fmtN(avgScore,1)}</span>{" · "}
            estimated improvement: <span style={{color:improvement!=null && improvement>0 ? "#4caf82" : "#f0a040"}}>{improvement==null ? "—" : `${fmtN(improvement,1)}%`}</span>
          </div>
        </Card>
        <Card>
          <Label>Recommended Project Mix</Label>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["Project","Type","St.","Composite Risk","EAL","VaR 99%","Priority"].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
            <tbody>
              {selected.map((p,i)=>(
                <tr key={`${p.name}-${i}`}>
                  <Td><span style={{color:T.text,fontWeight:500}}>{p.name}</span></Td>
                  <Td><span style={{color:typeColor(p.type)}}>{typeIcon(p.type)} {p.type}</span></Td>
                  <Td mono>{p.state}</Td>
                  <Td mono color={riskColor(p.score)} sourceKey="risk_engine">{fmtN(p.score,1)}</Td>
                  <Td mono color="#f0a040" sourceKey="risk_engine">{fmtM(p.eal)}</Td>
                  <Td mono color="#e85d5d" sourceKey="risk_engine">{fmtM(p.var99)}</Td>
                  <Td><Tag color={i<2 ? "#4caf82" : i<4 ? "#f0a040" : "#a78bfa"}>{i<2 ? "Core" : i<4 ? "Balanced" : "Satellite"}</Tag></Td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      </>}
    </div>
  );
}

// ─── HUMAN REVIEW ─────────────────────────────────────────────────────────────
function HumanReview() {
  const {data,loading,refetch} = useApi("/api/review/items");
  const [actions,setActions]   = useState({});
  const [notes,setNotes]       = useState({});
  const [submitting,setSubmitting] = useState({});
  const submit = async (itemId,action) => {
    setSubmitting(s=>({...s,[itemId]:true}));
    const result = await api("/api/review/action",{method:"POST",body:JSON.stringify({item_id:itemId,action,note:notes[itemId]||""})});
    if(result){setActions(a=>({...a,[itemId]:action}));refetch();}
    setSubmitting(s=>({...s,[itemId]:false}));
  };
  const pending = (data?.items||[]).filter(i=>!actions[i.id]).length;
  return (
    <div>
      <div style={{marginBottom:28}}><Label>Quality Gate</Label><h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Human Review</h1><p style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Review all flagged items before outputs are unlocked · Live risk data</p></div>
      <PageDescription>
        Human Review is a governance checkpoint that prevents automatic release of outputs when high-severity flags appear. Analysts approve or dismiss each item with notes, creating an auditable trail before reports can be generated.
      </PageDescription>
      {pending>0 && <div style={{background:"#140808",border:"1px solid #2a1010",borderRadius:8,padding:"14px 18px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}><span style={{color:"#e85d5d",fontSize:18}}>⚠</span><span style={{color:"#c8a0a0",fontSize:13,fontFamily:T.mono}}>{pending} item{pending>1?"s":""} pending — outputs locked</span></div>}
      {loading ? <Spinner/> : (data?.items||[]).map(item=>{
        const done=actions[item.id];
        return (
          <div key={item.id} style={{background:done==="approve"?"#080f0a":done==="dismiss"?"#0f0808":T.surface,border:`1px solid ${done==="approve"?"#1a3a28":done==="dismiss"?"#2a1010":T.border}`,borderRadius:8,padding:20,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}>
                  <Tag color={item.severity==="high"?"#e85d5d":item.severity==="medium"?"#f0a040":"#4caf82"}>{item.severity?.toUpperCase()}</Tag>
                  <span style={{fontSize:10,color:T.textDim,fontFamily:T.mono,letterSpacing:1}}>{item.type?.toUpperCase()}</span>
                  <span style={{fontSize:11,color:T.textDim}}>{item.project}</span>
                </div>
                <div style={{color:T.text,fontSize:13}}>{item.flag}</div>
              </div>
              {done==="approve" && <span style={{color:"#4caf82",fontSize:24}}>✓</span>}
              {done==="dismiss" && <span style={{color:"#e85d5d",fontSize:24}}>✗</span>}
            </div>
            <textarea placeholder="Add reviewer note (optional)…" value={notes[item.id]||""} onChange={e=>setNotes(n=>({...n,[item.id]:e.target.value}))} style={{width:"100%",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.textMid,fontSize:12,padding:"8px 12px",resize:"vertical",minHeight:48,fontFamily:T.mono,boxSizing:"border-box",marginBottom:12}}/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>submit(item.id,"approve")} disabled={!!done||submitting[item.id]} style={{padding:"8px 20px",border:"1px solid #1a3a28",background:done==="approve"?"#1a3a28":"transparent",borderRadius:6,color:"#4caf82",fontSize:11,cursor:done?"default":"pointer",fontFamily:T.mono,letterSpacing:1}}>✓ APPROVE</button>
              <button onClick={()=>submit(item.id,"dismiss")} disabled={!!done||submitting[item.id]} style={{padding:"8px 20px",border:"1px solid #2a1010",background:done==="dismiss"?"#2a1010":"transparent",borderRadius:6,color:"#e85d5d",fontSize:11,cursor:done?"default":"pointer",fontFamily:T.mono,letterSpacing:1}}>✗ DISMISS</button>
            </div>
          </div>
        );
      })}
      {!loading && pending===0 && Object.keys(actions).length>0 && (
        <div style={{background:"#080f0a",border:"1px solid #1a3a28",borderRadius:8,padding:20,textAlign:"center",marginTop:8}}>
          <div style={{color:"#4caf82",fontSize:18,fontFamily:T.serif,marginBottom:6}}>✓ All items reviewed — outputs unlocked</div>
          <div style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Proceed to Export Outputs</div>
        </div>
      )}
    </div>
  );
}

// ─── DEBT HOLDERS ──────────────────────────────────────────────────────────────
function DebtHolders() {
  const {data:projectsData,loading} = useApi("/api/projects");
  const projects = projectsData?.projects || [];
  const rows = projects.map((p)=>{
    const fm = p.financial_model?.metrics || {};
    const debtPrincipal = fm.debt_principal_usd ?? (p.capex || 0) * (p.financial_model?.assumptions?.debt_ratio ?? 0.6);
    const annualDebtService = fm.annual_debt_service_usd ?? 0;
    const annualEbitda = fm.annual_ebitda_usd ?? 0;
    const dscr = fm.dscr ?? (annualDebtService > 0 ? annualEbitda / annualDebtService : null);
    const leverage = (p.capex || 0) > 0 ? debtPrincipal / p.capex : null;
    const covenant = dscr == null ? "No Data" : dscr >= 1.30 ? "Pass" : dscr >= 1.10 ? "Watch" : "Breach";
    return {
      name: p.name,
      type: p.type,
      state: p.state,
      debtPrincipal,
      annualDebtService,
      annualEbitda,
      dscr,
      leverage,
      covenant,
      status: p.status,
    };
  });
  const totalDebt = rows.reduce((s,r)=>s+r.debtPrincipal,0);
  const totalDebtService = rows.reduce((s,r)=>s+r.annualDebtService,0);
  const weightedDscrNum = rows.reduce((s,r)=>s + (r.dscr != null ? r.dscr * r.debtPrincipal : 0),0);
  const weightedDscrDen = rows.reduce((s,r)=>s + (r.dscr != null ? r.debtPrincipal : 0),0);
  const weightedDscr = weightedDscrDen > 0 ? weightedDscrNum / weightedDscrDen : null;
  const breachCount = rows.filter((r)=>r.covenant==="Breach").length;

  return (
    <div>
      <div style={{marginBottom:28}}>
        <Label>Outputs</Label>
        <h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Debt Holders</h1>

        This page summarizes debt holder risk for each project using debt principal, annual debt service, DSCR, leverage, and covenant-style status to support credit committee and lender monitoring workflows.
      </PageDescription>
      {loading ? <Spinner/> : <>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <KPI label="Portfolio Debt Principal" value={fmtM(totalDebt)} color="#4ecdc4" sourceKey="financial_model"/>
          <KPI label="Annual Debt Service" value={fmtM(totalDebtService)} color="#f0a040" sourceKey="financial_model"/>
          <KPI label="Weighted DSCR" value={weightedDscr==null ? "—" : fmtN(weightedDscr,2)} color={weightedDscr==null ? T.text : weightedDscr>=1.3 ? "#4caf82" : weightedDscr>=1.1 ? "#f0a040" : "#e85d5d"} sourceKey="financial_model"/>
          <KPI label="Covenant Breaches" value={breachCount} color={breachCount===0 ? "#4caf82" : "#e85d5d"} sourceKey="financial_model"/>
        </div>
        <Card>
          <Label>Debt Holder Project Table</Label>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["Project","Type","St.","Status","Debt Principal","Annual Debt Service","Annual EBITDA","DSCR","Leverage","Covenant"].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
            <tbody>
              {rows.map((r,i)=>(
                <tr key={`${r.name}-${i}`}>
                  <Td><span style={{color:T.text,fontWeight:500}}>{r.name}</span></Td>
                  <Td><span style={{color:typeColor(r.type)}}>{typeIcon(r.type)} {r.type}</span></Td>
                  <Td mono>{r.state}</Td>
                  <Td><Tag color={r.status==="Operating"?"#4caf82":r.status==="Construction"?"#f0a040":"#a78bfa"}>{r.status || "—"}</Tag></Td>
                  <Td mono color="#4ecdc4" sourceKey="financial_model">{fmtM(r.debtPrincipal)}</Td>
                  <Td mono sourceKey="financial_model">{fmtM(r.annualDebtService)}</Td>
                  <Td mono color="#4caf82" sourceKey="financial_model">{fmtM(r.annualEbitda)}</Td>
                  <Td mono color={r.dscr==null ? T.textDim : r.dscr>=1.3 ? "#4caf82" : r.dscr>=1.1 ? "#f0a040" : "#e85d5d"} sourceKey="financial_model">
                    {r.dscr==null ? "—" : fmtN(r.dscr,2)}
                  </Td>
                  <Td mono color={r.leverage==null ? T.textDim : r.leverage<=0.6 ? "#4caf82" : r.leverage<=0.75 ? "#f0a040" : "#e85d5d"} sourceKey="financial_model">
                    {r.leverage==null ? "—" : `${fmtN(r.leverage*100,0)}%`}
                  </Td>
                  <Td><Tag color={r.covenant==="Pass" ? "#4caf82" : r.covenant==="Watch" ? "#f0a040" : r.covenant==="Breach" ? "#e85d5d" : "#4a5580"}>{r.covenant}</Tag></Td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      </>}
    </div>
  );
}

// ─── EQUITY HOLDERS ────────────────────────────────────────────────────────────
function EquityHolders() {
  const {data:projectsData,loading} = useApi("/api/projects");
  const projects = projectsData?.projects || [];
  const rows = projects.map((p)=>{
    const fm = p.financial_model?.metrics || {};
    const assumptions = p.financial_model?.assumptions || {};
    const debtRatio = assumptions.debt_ratio ?? 0.6;
    const equityShare = Math.max(0, 1 - debtRatio);
    const equityCapital = fm.equity_usd ?? (p.capex || 0) * equityShare;
    const annualEbitda = fm.annual_ebitda_usd ?? 0;
    const annualDebtService = fm.annual_debt_service_usd ?? 0;
    const residualCash = Math.max(0, annualEbitda - annualDebtService);
    const irr = fm.irr_pct ?? null;
    return {name:p.name,type:p.type,state:p.state,status:p.status,equityCapital,residualCash,irr,equityShare};
  });
  const totalEquity = rows.reduce((s,r)=>s+r.equityCapital,0);
  const totalResidual = rows.reduce((s,r)=>s+r.residualCash,0);
  const avgIrr = rows.filter((r)=>r.irr!=null).length
    ? rows.filter((r)=>r.irr!=null).reduce((s,r)=>s+r.irr,0) / rows.filter((r)=>r.irr!=null).length
    : null;
  const highReturnCount = rows.filter((r)=>r.irr!=null && r.irr>=14).length;

  return (
    <div>
      <div style={{marginBottom:28}}>
        <Label>Outputs</Label>
        <h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Equity Holders</h1>
        <p style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Sponsor and investor lens on capital at risk and upside capture</p>
      </div>
      <PageDescription>
        This page highlights equity-focused economics including committed equity, residual cash after debt service, projected IRR, and indicative return quality by project.
      </PageDescription>
      {loading ? <Spinner/> : <>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <KPI label="Equity Capital Deployed" value={fmtM(totalEquity)} color="#4ecdc4" sourceKey="financial_model"/>
          <KPI label="Residual Cash (Annual)" value={fmtM(totalResidual)} color="#4caf82" sourceKey="financial_model"/>
          <KPI label="Avg Project IRR" value={avgIrr==null ? "—" : `${fmtN(avgIrr,2)}%`} color="#a78bfa" sourceKey="financial_model"/>
          <KPI label="High Return Projects" value={highReturnCount} color={highReturnCount>0 ? "#4caf82" : T.textDim} sourceKey="financial_model"/>
        </div>
        <Card>
          <Label>Equity Holder Project Table</Label>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["Project","Type","St.","Status","Equity Share","Equity Capital","Residual Cash","IRR (10Y)","Return Bucket"].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
            <tbody>
              {rows.map((r,i)=>(
                <tr key={`${r.name}-${i}`}>
                  <Td><span style={{color:T.text,fontWeight:500}}>{r.name}</span></Td>
                  <Td><span style={{color:typeColor(r.type)}}>{typeIcon(r.type)} {r.type}</span></Td>
                  <Td mono>{r.state}</Td>
                  <Td><Tag color={r.status==="Operating"?"#4caf82":r.status==="Construction"?"#f0a040":"#a78bfa"}>{r.status || "—"}</Tag></Td>
                  <Td mono sourceKey="financial_model">{fmtN((r.equityShare||0)*100,0)}%</Td>
                  <Td mono color="#4ecdc4" sourceKey="financial_model">{fmtM(r.equityCapital)}</Td>
                  <Td mono color="#4caf82" sourceKey="financial_model">{fmtM(r.residualCash)}</Td>
                  <Td mono color={r.irr==null ? T.textDim : r.irr>=14 ? "#4caf82" : r.irr>=10 ? "#f0a040" : "#e85d5d"} sourceKey="financial_model">
                    {r.irr==null ? "—" : `${fmtN(r.irr,2)}%`}
                  </Td>
                  <Td><Tag color={r.irr==null ? "#4a5580" : r.irr>=14 ? "#4caf82" : r.irr>=10 ? "#f0a040" : "#e85d5d"}>{r.irr==null ? "No Data" : r.irr>=14 ? "Attractive" : r.irr>=10 ? "Moderate" : "Thin"}</Tag></Td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      </>}
    </div>
  );
}

// ─── INSURANCE PROVIDERS ───────────────────────────────────────────────────────
function InsuranceProviders() {
  const {data:portfolioData,loading} = useApi("/api/risk/portfolio");
  const projects = portfolioData?.projects || [];
  const rows = projects.map((p)=>{
    const eal = p.losses?.eal ?? 0;
    const var99 = p.losses?.var_99 ?? 0;
    const tv = p.losses?.tvar_99 ?? 0;
    const premium = eal * 0.35;
    const impliedLossRatio = premium > 0 ? eal / premium : null;
    return {
      name:p.project_name,type:p.project_type,state:p.state,score:p.scores?.composite ?? 0,
      eal,var99,tv,premium,impliedLossRatio
    };
  });
  const totalPremium = rows.reduce((s,r)=>s+r.premium,0);
  const totalEal = rows.reduce((s,r)=>s+r.eal,0);
  const totalVar = rows.reduce((s,r)=>s+r.var99,0);
  const portfolioLossRatio = totalPremium>0 ? totalEal/totalPremium : null;

  return (
    <div>
      <div style={{marginBottom:28}}>
        <Label>Outputs</Label>
        <h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Insurance Providers</h1>
        <p style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Carrier-facing loss, tail, and pricing view by project</p>
      </div>
      <PageDescription>
        This page provides insurer-relevant indicators including expected loss, tail risk, implied premium signal, and loss ratio to support pricing and capacity decisions.
      </PageDescription>
      {loading ? <Spinner/> : <>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <KPI label="Implied Premium (Portfolio)" value={fmtM(totalPremium)} color="#4ecdc4" sourceKey="risk_engine"/>
          <KPI label="Portfolio EAL" value={fmtM(totalEal)} color="#f0a040" sourceKey="risk_engine"/>
          <KPI label="Portfolio VaR 99%" value={fmtM(totalVar)} color="#e85d5d" sourceKey="risk_engine"/>
          <KPI label="Portfolio Loss Ratio" value={portfolioLossRatio==null ? "—" : `${fmtN(portfolioLossRatio*100,1)}%`} color={portfolioLossRatio==null ? T.textDim : portfolioLossRatio<=70 ? "#4caf82" : portfolioLossRatio<=95 ? "#f0a040" : "#e85d5d"} sourceKey="risk_engine"/>
        </div>
        <Card>
          <Label>Insurance Provider Project Table</Label>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["Project","Type","St.","Composite Risk","EAL","VaR 99%","TVaR 99%","Implied Premium","Loss Ratio"].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
            <tbody>
              {rows.map((r,i)=>(
                <tr key={`${r.name}-${i}`}>
                  <Td><span style={{color:T.text,fontWeight:500}}>{r.name}</span></Td>
                  <Td><span style={{color:typeColor(r.type)}}>{typeIcon(r.type)} {r.type}</span></Td>
                  <Td mono>{r.state}</Td>
                  <Td mono color={riskColor(r.score)} sourceKey="risk_engine">{fmtN(r.score,1)}</Td>
                  <Td mono color="#f0a040" sourceKey="risk_engine">{fmtM(r.eal)}</Td>
                  <Td mono color="#e85d5d" sourceKey="risk_engine">{fmtM(r.var99)}</Td>
                  <Td mono color="#ff6b6b" sourceKey="risk_engine">{fmtM(r.tv)}</Td>
                  <Td mono color="#4ecdc4" sourceKey="risk_engine">{fmtM(r.premium)}</Td>
                  <Td mono color={r.impliedLossRatio==null ? T.textDim : r.impliedLossRatio<=0.70 ? "#4caf82" : r.impliedLossRatio<=0.95 ? "#f0a040" : "#e85d5d"} sourceKey="risk_engine">
                    {r.impliedLossRatio==null ? "—" : `${fmtN(r.impliedLossRatio*100,1)}%`}
                  </Td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      </>}
    </div>
  );
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function ExportOutputs() {
  const {data:locked}    = useApi("/api/review/locked");
  const [framework,setFramework]   = useState("NAIC RBC");
  const [reportType,setReportType] = useState("Actuarial Reserve Memo");
  const [generating,setGenerating] = useState(null);
  const [done,setDone]             = useState({});
  const isLocked = locked?.locked;
  const generate = (type) => {
    if(isLocked) return;
    setGenerating(type);
    setTimeout(()=>{setGenerating(null);setDone(d=>({...d,[type]:true}));},2000);
  };
  const frameworks = ["NAIC RBC","Solvency II","Lloyd's RDS","Basel IV","TCFD","IFRS 9"];
  const reportTypes = ["Actuarial Reserve Memo","Risk Register Report","NAIC RBC Filing Package","Executive Summary","Correlation Analysis","Project Deep Dive"];
  return (
    <div>
      <div style={{marginBottom:28}}><Label>Report Generation</Label><h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Export Outputs</h1></div>
      <PageDescription>
        Export Outputs packages approved analytics into report formats for underwriting, actuarial, and compliance teams. Generation stays locked until review is complete, enforcing a controlled handoff from model results to decision-ready deliverables.
      </PageDescription>
      {isLocked && <div style={{background:"#140808",border:"1px solid #2a1010",borderRadius:8,padding:"14px 18px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}><span style={{color:"#e85d5d"}}>🔒</span><span style={{color:"#c8a0a0",fontSize:13,fontFamily:T.mono}}>{locked.pending} review item{locked.pending>1?"s":""} pending. Complete Human Review to unlock.</span></div>}
      <Card style={{marginBottom:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
          <div>
            <Label>Regulatory Framework</Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {frameworks.map(f=>(
                <button key={f} onClick={()=>setFramework(f)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${framework===f?"#4ecdc4":T.border}`,background:framework===f?"#072020":"transparent",color:framework===f?"#4ecdc4":T.textDim,fontSize:11,cursor:"pointer",fontFamily:T.mono}}>{f}</button>
              ))}
            </div>
          </div>
          <div>
            <Label>Report Type</Label>
            <select value={reportType} onChange={e=>setReportType(e.target.value)} style={{width:"100%",padding:"10px 12px",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,fontFamily:T.mono}}>
              {reportTypes.map(r=><option key={r}>{r}</option>)}
            </select>
          </div>
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        {[{type:"pdf",icon:"📄",label:"PDF Report",desc:`${reportType} · ${framework} framework`},{type:"xlsx",icon:"📊",label:"Excel Workbook",desc:"Risk register, RBC calcs, correlations, scenarios"},{type:"memo",icon:"📋",label:"Actuarial Reserve Memo",desc:"Signed memo format · NAIC compliant"},{type:"json",icon:"⟨/⟩",label:"JSON / API Export",desc:"Machine-readable · insurer/bank system ingestion"}].map(o=>(
          <Card key={o.type}>
            <div style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:16}}>
              <div style={{fontSize:28}}>{o.icon}</div>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:T.text}}>{o.label}</div>
                <div style={{fontSize:11,color:T.textDim,marginTop:4,fontFamily:T.mono,lineHeight:1.6}}>{o.desc}</div>
              </div>
            </div>
            {done[o.type]
              ? <div style={{display:"flex",gap:10}}>
                  <button style={{flex:1,padding:10,background:"#080f0a",border:"1px solid #1a3a28",borderRadius:6,color:"#4caf82",fontSize:11,cursor:"pointer",fontFamily:T.mono}}>↓ DOWNLOAD</button>
                  <button onClick={()=>setDone(d=>({...d,[o.type]:false}))} style={{padding:"10px 14px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:6,color:T.textDim,fontSize:11,cursor:"pointer"}}>↺</button>
                </div>
              : <button onClick={()=>generate(o.type)} disabled={isLocked||generating===o.type} style={{width:"100%",padding:10,background:"transparent",border:`1px solid ${isLocked?T.bg:T.border}`,borderRadius:6,color:isLocked?T.textDim:generating===o.type?T.textDim:"#4ecdc4",fontSize:11,cursor:isLocked?"not-allowed":"pointer",fontFamily:T.mono,letterSpacing:1}}>
                  {generating===o.type?"GENERATING...":isLocked?"🔒 LOCKED":"GENERATE →"}
                </button>}
          </Card>
        ))}
      </div>
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────────────────────
function App() {
  const [active,setActive]               = useState("dashboard");
  const [pipelineRunning,setPipeline]    = useState(false);
  const [reviewPending,setReviewPending] = useState(0);
  const [pv,setPv]                       = useState(0);

  useEffect(()=>{
    const poll = async()=>{ const d=await api("/api/review/items"); if(d) setReviewPending(d.pending||0); };
    poll();
    const id=setInterval(poll,30000);
    return ()=>clearInterval(id);
  },[]);

  useEffect(() => {
    const onNavigate = (e) => {
      const section = e?.detail?.section;
      if (section) setActive(section);
    };
    window.addEventListener("navigate-section", onNavigate);
    return () => window.removeEventListener("navigate-section", onNavigate);
  }, []);

  const handleSync = async()=>{
    setPipeline(true);
    await api("/api/pipeline/run",{method:"POST"});
    setTimeout(()=>setPipeline(false),8000);
  };

  const screens = {
    "dashboard":   <Dashboard key={pv}/>,
    "add-project": <AddProject onProjectAdded={()=>setPv(v=>v+1)}/>,
    "risk-model":  <RiskModel key={pv}/>,
    "financial-models": <FinancialModels key={pv}/>,
    "correlation": <CorrelationMatrix key={pv}/>,
    "naic":        <NaicRBC key={pv}/>,
    "scenario-analysis": <ScenarioAnalysis key={pv}/>,
    "optimized-portfolio": <OptimizedPortfolio key={pv}/>,
    "data-feeds":  <DataFeeds/>,
    "review":      <HumanReview/>,
    "equity-holders": <EquityHolders key={pv}/>,
    "insurance-providers": <InsuranceProviders key={pv}/>,
    "debt-holders": <DebtHolders key={pv}/>,
    "export":      <ExportOutputs/>,
  };

  return (
    <div style={{background:T.bg,minHeight:"100vh"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:${T.bg};}
        ::-webkit-scrollbar{width:5px;height:5px;background:${T.bg};}
        ::-webkit-scrollbar-thumb{background:${T.border};border-radius:3px;}
        select option{background:${T.surface};}
        input,textarea,select{outline:none;}
        textarea::placeholder,input::placeholder{color:${T.textDim};}
        button{transition:opacity 0.12s;font-family:inherit;}
        button:hover:not(:disabled){opacity:0.8;}
        .src-wrap:hover .src-box{opacity:1;pointer-events:auto;transform:translateY(0);}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:0.8;}}
      `}</style>
      <Sidebar active={active} setActive={setActive} reviewPending={reviewPending} pipelineRunning={pipelineRunning} onSync={handleSync}/>
      <main style={{marginLeft:218,padding:"40px 48px",maxWidth:1260}}>
        {screens[active]||<Dashboard/>}
      </main>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
