<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── PRODUCTION: replace with your Render backend URL ──────────────────────
    // Example: "https://meridian-backend.onrender.com"
    // Leave as empty string to auto-detect (same origin, for reverse-proxy setups)
    const API_BASE = "https://risk-mit-app.onrender.com";
    const API = API_BASE;


// ─── CONFIG ───────────────────────────────────────────────────────────────────


// ─── API CLIENT ───────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  try {
    const res = await fetch(`${API}${path}`, {
      headers: { "Content-Type": "application/json" },
      ...opts,
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.error(`API error ${path}:`, e);
    return null;
  }
}

function useApi(path, deps = []) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const fetch_ = useCallback(async () => {
    setLoading(true); setError(null);
    const result = await api(path);
    if (result) setData(result); else setError("Failed to load");
    setLoading(false);
  }, [path]);
  useEffect(() => { fetch_(); }, deps);
  return { data, loading, error, refetch: fetch_ };
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
const fmtM = (n) => {
  if (!n && n !== 0) return "—";
  if (Math.abs(n) >= 1e9) return `$${(n/1e9).toFixed(2)}B`;
  if (Math.abs(n) >= 1e6) return `$${(n/1e6).toFixed(1)}M`;
  return `$${n.toLocaleString()}`;
};
const fmtN = (n, d=0) => n?.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})??"—";
const riskColor = (s) => s >= 80 ? "#e85d5d" : s >= 60 ? "#f0a040" : "#4caf82";
const typeColor = (t) => t === "Geothermal" ? "#4ecdc4" : t === "Nuclear SMR" ? "#a78bfa" : "#f59e0b";
const typeIcon  = (t) => t === "Geothermal" ? "⬡" : t === "Nuclear SMR" ? "◎" : "▣";
const T = {
  bg:"#070b14", surface:"#0c1220", border:"#16213a", borderHi:"#1e2f50",
  text:"#dde3f5", textDim:"#3d4f72", textMid:"#7a8fba",
  mono:"'IBM Plex Mono', monospace", serif:"'Cormorant Garamond', serif",
};

// ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
const Card = ({children,style}) => <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:24,...style}}>{children}</div>;
const Label = ({children}) => <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",color:T.textDim,marginBottom:8,fontFamily:T.mono}}>{children}</div>;
const Spinner = () => <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:60}}><div style={{width:24,height:24,border:`2px solid ${T.border}`,borderTopColor:"#4ecdc4",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>;
const Tag = ({children,color="#4a5580"}) => <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:`${color}18`,color,border:`1px solid ${color}30`,fontFamily:T.mono,letterSpacing:1}}>{children}</span>;
const Th = ({children}) => <th style={{padding:"8px 10px",color:T.textDim,fontSize:10,textTransform:"uppercase",letterSpacing:1,textAlign:"left",fontWeight:500,fontFamily:T.mono,borderBottom:`1px solid ${T.border}`}}>{children}</th>;
const Td = ({children,mono,color}) => <td style={{padding:"11px 10px",color:color||T.textMid,fontFamily:mono?T.mono:undefined,borderBottom:`1px solid ${T.bg}`,fontSize:12}}>{children}</td>;
const PageDescription = ({children}) => (
  <Card style={{marginBottom:16,padding:"14px 18px",background:"#091325",borderColor:T.borderHi}}>
    <div style={{fontSize:11,color:T.textMid,fontFamily:T.mono,lineHeight:1.7}}>{children}</div>
  </Card>
);

function KPI({label,value,sub,color,loading}) {
  return (
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"18px 22px",flex:1,minWidth:130}}>
      <Label>{label}</Label>
      {loading
        ? <div style={{height:32,background:T.border,borderRadius:4,width:"70%",animation:"pulse 1.5s infinite"}}/>
        : <div style={{fontSize:24,fontWeight:700,color:color||T.text,fontFamily:T.serif,letterSpacing:-0.5}}>{value}</div>}
      {sub && <div style={{fontSize:11,color:T.textDim,marginTop:4,fontFamily:T.mono}}>{sub}</div>}
    </div>
  );
}

              <span style={{fontSize:13,width:16,textAlign:"center"}}>{item.icon}</span>

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard() {
  const {data:portfolio,loading} = useApi("/api/risk/portfolio");
  const {data:naic}              = useApi("/api/naic/summary");
  const {data:projects}          = useApi("/api/projects");
  const ps = projects?.projects||[];
  const totalCapex = ps.reduce((s,p)=>s+p.capex,0);
  const totalMW    = ps.reduce((s,p)=>s+p.mw,0);
  const byType = ps.reduce((acc,p)=>{
    if(!acc[p.type]) acc[p.type]={count:0,capex:0};
    acc[p.type].count++; acc[p.type].capex+=p.capex; return acc;
  },{});

  return (
    <div>
      <div style={{marginBottom:28}}>
        <Label>Portfolio Overview</Label>
        <h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0 6px",letterSpacing:-1}}>Risk Dashboard</h1>
        <p style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Storage · Nuclear SMR · Geothermal — NAIC RBC — Live Pipeline Data</p>
      </div>
      <PageDescription>
        This dashboard summarizes portfolio-level exposure and loss outcomes using live project records plus synced external data. It combines project counts, capital at risk, expected annual loss, and NAIC capital requirements so you can see where risk is concentrated before drilling into model details.
      </PageDescription>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
        <KPI label="Projects"        value={ps.length}                         sub="In portfolio"       loading={loading}/>
        <KPI label="Total Capacity"  value={`${fmtN(totalMW)} MW`}            sub="All technologies"   loading={loading}/>
        <KPI label="Total CapEx"     value={fmtM(totalCapex)}                  sub="Gross exposure"     loading={loading}/>
        <KPI label="Portfolio EAL"   value={fmtM(portfolio?.total_eal)}        sub="Expected ann. loss" color="#f0a040" loading={loading}/>
        <KPI label="VaR 99% (net)"   value={fmtM(portfolio?.total_var99_net)}  sub="Post-diversif."     color="#e85d5d" loading={loading}/>
        <KPI label="NAIC RBC"        value={fmtM(naic?.portfolio_rbc_net)}     sub="Capital required"   color="#a78bfa" loading={loading}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <Card>
          <Label>Exposure by Technology</Label>
          {loading ? <Spinner/> : Object.entries(byType).map(([type,d])=>(
            <div key={type} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:12,color:typeColor(type),fontFamily:T.mono}}>{typeIcon(type)} {type}</span>
                <span style={{fontSize:11,color:T.textDim,fontFamily:T.mono}}>{fmtM(d.capex)}</span>
              </div>
              <div style={{height:4,background:T.border,borderRadius:2}}>
                <div style={{height:4,width:`${(d.capex/totalCapex)*100}%`,background:typeColor(type),borderRadius:2,opacity:0.85}}/>
              </div>
            </div>
          ))}
        </Card>
        <Card>
          <Label>NAIC RBC by Project</Label>
          {!naic ? <Spinner/> : <>
            {naic.projects.map((p,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${T.bg}`}}>
                <div>
                  <div style={{fontSize:11,color:T.text}}>{p.name.split(" ").slice(0,3).join(" ")}</div>
                  <div style={{fontSize:10,color:T.textDim,marginTop:2}}>{p.type} · {p.state}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:13,color:"#a78bfa",fontFamily:T.mono,fontWeight:600}}>{fmtM(p.rbc_total)}</div>
                  <div style={{fontSize:10,color:riskColor(p.composite),fontFamily:T.mono}}>Score: {p.composite}</div>
                </div>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",paddingTop:8}}>
              <span style={{fontSize:12,color:T.text,fontWeight:600}}>Total RBC Required</span>
              <span style={{fontSize:16,color:"#a78bfa",fontFamily:T.mono,fontWeight:700}}>{fmtM(naic.portfolio_rbc_net)}</span>
            </div>
          </>}
        </Card>
      </div>
      <Card>
        <Label>Project Register — Live Risk Data</Label>
        {loading ? <Spinner/> : (
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["Project","Type","St.","MW","CapEx","Status","Risk","EAL","VaR 99%"].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
            <tbody>
              {(portfolio?.projects||[]).map((pr,i)=>{
                const p=ps[i]; if(!p) return null;
                return (
                  <tr key={p.id}>
                    <Td><span style={{color:T.text,fontWeight:500}}>{p.name}</span></Td>
                    <Td><span style={{color:typeColor(p.type)}}>{typeIcon(p.type)} {p.type}</span></Td>
                    <Td mono>{p.state}</Td>
                    <Td mono>{p.mw}</Td>
                    <Td mono>{fmtM(p.capex)}</Td>
                    <Td><Tag color={p.status==="Operating"?"#4caf82":p.status==="Construction"?"#f0a040":"#e85d5d"}>{p.status}</Tag></Td>
                    <Td mono color={riskColor(pr.scores?.composite)}>{pr.scores?.composite?.toFixed(1)}</Td>
                    <Td mono color="#f0a040">{fmtM(pr.losses?.eal)}</Td>
                    <Td mono color="#e85d5d">{fmtM(pr.losses?.var_99)}</Td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

// ─── ADD PROJECT ─────────────────────────────────────────────────────────────
function AddProject({onProjectAdded}) {
  const [form,setForm] = useState({name:"",type:"Geothermal",state:"NV",mw:"",capex:"",offtake:"PPA-Utility",status:"Development"});
  const [submitting,setSubmitting] = useState(false);
  const [done,setDone] = useState(null);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const STATES = ["AK","AL","AR","AZ","CA","CO","CT","DE","FL","GA","HI","IA","ID","IL","IN","KS","KY","LA","MA","MD","ME","MI","MN","MO","MS","MT","NC","ND","NE","NH","NJ","NM","NV","NY","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VA","VT","WA","WI","WV","WY"];
  const submit = async () => {
    if(!form.name||!form.mw||!form.capex) return;
    setSubmitting(true);
    const result = await api("/api/projects",{method:"POST",body:JSON.stringify({...form,mw:parseFloat(form.mw),capex:parseFloat(form.capex)})});
    setSubmitting(false);
    if(result){setDone(result.project);onProjectAdded?.();}
  };
  const Field = ({label,field,type="text",options}) => (
    <div style={{marginBottom:18}}>
      <Label>{label}</Label>
      {options
        ? <select value={form[field]} onChange={e=>set(field,e.target.value)} style={{width:"100%",padding:"10px 12px",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,fontFamily:T.mono}}>
            {options.map(o=><option key={o}>{o}</option>)}
          </select>
        : <input type={type} value={form[field]} onChange={e=>set(field,e.target.value)} style={{width:"100%",padding:"10px 12px",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,fontFamily:T.mono,boxSizing:"border-box"}}/>}
    </div>
  );
  if(done) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:400,gap:16}}>
      <div style={{fontSize:48,color:"#4caf82"}}>✓</div>
      <div style={{color:T.text,fontSize:20,fontFamily:T.serif}}>Project Added Successfully</div>
      <div style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>{done.name} · {done.type} · {done.state}</div>
      <button onClick={()=>{setDone(null);setForm({name:"",type:"Geothermal",state:"NV",mw:"",capex:"",offtake:"PPA-Utility",status:"Development"});}} style={{marginTop:12,padding:"10px 28px",background:"transparent",border:"1px solid #4ecdc4",color:"#4ecdc4",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:T.mono,letterSpacing:1}}>ADD ANOTHER</button>
    </div>
  );
  return (
    <div>
      <div style={{marginBottom:28}}><Label>Data Entry</Label><h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Add Project</h1></div>
      <PageDescription>
        Use this page to register a project in the underwriting portfolio. Each field feeds downstream scoring and capital calculations, so entries here become part of the risk engine, review queue, and export outputs after the next analysis refresh.
      </PageDescription>
      <Card style={{maxWidth:680}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 28px"}}>
          <Field label="Project Name"      field="name"/>
          <Field label="Technology Type"   field="type"    options={["Geothermal","Nuclear SMR","Battery Storage"]}/>
          <Field label="U.S. State"        field="state"   options={STATES}/>
          <Field label="Capacity (MW)"     field="mw"      type="number"/>
          <Field label="Total CapEx (USD)" field="capex"   type="number"/>
          <Field label="Offtake Structure" field="offtake" options={["PPA-Utility","PPA-Commercial","Merchant","Self-Supply"]}/>
          <Field label="Project Status"    field="status"  options={["Development","Construction","Operating","Decommissioning"]}/>
          <div style={{gridColumn:"1/-1",marginTop:8}}>
            <button onClick={submit} disabled={submitting} style={{padding:"11px 32px",background:submitting?T.border:"#4ecdc4",border:"none",borderRadius:6,color:T.bg,fontWeight:700,fontSize:12,cursor:submitting?"default":"pointer",fontFamily:T.mono,letterSpacing:1}}>
              {submitting?"ADDING...":"ADD TO PORTFOLIO →"}
            </button>
          </div>
        </div>
      </Card>
    </div>
  );
}

// ─── RISK MODEL ───────────────────────────────────────────────────────────────
function RiskModel() {
  const {data:portfolio,loading} = useApi("/api/risk/portfolio");
  const [sel,setSel] = useState(0);
  const projects = portfolio?.projects||[];
  const pr = projects[sel];
  return (
    <div>
      <div style={{marginBottom:28}}><Label>Methodology</Label><h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Risk Model</h1><p style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>8-factor scoring · Monte Carlo · t-Copula · NAIC RBC · Live DB adjustments</p></div>
      <PageDescription>
        This view explains how each project score is produced and translated into loss distributions. Factor scores drive the composite risk rating, Monte Carlo outputs estimate downside scenarios, and NAIC RBC components convert modeled risk into required regulatory capital.
      </PageDescription>
      {loading ? <Spinner/> : <>
        <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
          {projects.map((p,i)=>(
            <button key={i} onClick={()=>setSel(i)} style={{padding:"7px 16px",borderRadius:20,border:`1px solid ${sel===i?typeColor(p.project_type):T.border}`,background:sel===i?`${typeColor(p.project_type)}15`:"transparent",color:sel===i?typeColor(p.project_type):T.textDim,fontSize:11,cursor:"pointer",fontFamily:T.mono}}>
              {typeIcon(p.project_type)} {p.project_name?.split(" ").slice(0,3).join(" ")}
            </button>
          ))}
        </div>
        {pr && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <Card>
              <Label>Risk Factor Scores</Label>
              {Object.entries(pr.scores||{}).filter(([k])=>k!=="composite").map(([k,v])=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:12,marginBottom:13}}>
                  <div style={{width:130,fontSize:11,color:T.textMid,fontFamily:T.mono,textTransform:"capitalize"}}>{k.replace("_"," ")}</div>
                  <div style={{flex:1,height:5,background:T.border,borderRadius:2}}>
                    <div style={{height:5,width:`${v}%`,background:riskColor(v),borderRadius:2,opacity:0.85,transition:"width 0.4s"}}/>
                  </div>
                  <div style={{width:32,textAlign:"right",fontSize:12,color:riskColor(v),fontFamily:T.mono,fontWeight:600}}>{v?.toFixed(0)}</div>
                </div>
              ))}
              <div style={{borderTop:`1px solid ${T.border}`,paddingTop:12,marginTop:4,display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:12,color:T.text,fontWeight:600,fontFamily:T.mono}}>COMPOSITE</span>
                <span style={{fontSize:18,fontWeight:700,color:riskColor(pr.scores?.composite),fontFamily:T.mono}}>{pr.scores?.composite?.toFixed(1)}</span>
              </div>
            </Card>
            <Card>
              <Label>Loss Distribution</Label>
              {[{label:"Expected Annual Loss",value:pr.losses?.eal,color:"#4caf82"},{label:"VaR 95%",value:pr.losses?.var_95,color:"#f0a040"},{label:"VaR 99%",value:pr.losses?.var_99,color:"#e85d5d"},{label:"TVaR 99% (CVaR)",value:pr.losses?.tvar_99,color:"#ff6b6b"},{label:"PML (1-in-200yr)",value:pr.losses?.pml,color:"#ff4040"}].map(r=>(
                <div key={r.label} style={{display:"flex",justifyContent:"space-between",marginBottom:11,paddingBottom:11,borderBottom:`1px solid ${T.bg}`}}>
                  <span style={{fontSize:12,color:T.textMid}}>{r.label}</span>
                  <span style={{fontFamily:T.mono,fontSize:13,color:r.color,fontWeight:600}}>{fmtM(r.value)}</span>
                </div>
              ))}
              <div style={{marginTop:16}}><Label>NAIC RBC</Label>
                {[{label:"C-1 Asset Risk",value:pr.naic_rbc?.c1,color:"#4ecdc4"},{label:"C-2 Insurance Risk",value:pr.naic_rbc?.c2,color:"#a78bfa"},{label:"C-3 Interest Rate",value:pr.naic_rbc?.c3,color:"#f59e0b"},{label:"C-4 Business Risk",value:pr.naic_rbc?.c4,color:"#4caf82"}].map(r=>(
                  <div key={r.label} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:11,color:T.textMid,fontFamily:T.mono}}>{r.label}</span>
                    <span style={{fontFamily:T.mono,fontSize:12,color:r.color}}>{fmtM(r.value)}</span>
                  </div>
                ))}
                <div style={{borderTop:`1px solid ${T.border}`,paddingTop:10,marginTop:8,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:12,color:T.text,fontWeight:600}}>Total RBC</span>
                  <span style={{fontFamily:T.mono,fontSize:15,color:"#a78bfa",fontWeight:700}}>{fmtM(pr.naic_rbc?.total)}</span>
                </div>
              </div>
            </Card>
          </div>
        )}
      </>}

}

// ─── CORRELATION ─────────────────────────────────────────────────────────────
function CorrelationMatrix() {
  const {data,loading} = useApi("/api/risk/correlation");
  const corrColor = (v) => { const r=Math.round(255*v),b=Math.round(255*(1-v)); return `rgba(${r},70,${b},${0.25+v*0.75})`; };
  return (
    <div>

        <Card style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",fontSize:10,fontFamily:T.mono}}>

                  <div style={{transform:"rotate(-40deg)",whiteSpace:"nowrap",transformOrigin:"bottom left",marginLeft:8,marginBottom:4,fontSize:9}}>{l}</div>

                  {row.map((v,j)=>(
                    <td key={j} style={{padding:2}}>
                      <div style={{width:46,height:30,display:"flex",alignItems:"center",justifyContent:"center",background:corrColor(v),borderRadius:3,color:v>0.5?"#fff":T.textMid,fontSize:10}}>
                        {v.toFixed(2)}

// ─── HUMAN REVIEW ─────────────────────────────────────────────────────────────
function HumanReview() {
  const {data,loading,refetch} = useApi("/api/review/items");
  const [actions,setActions]   = useState({});
  const [notes,setNotes]       = useState({});
  const [submitting,setSubmitting] = useState({});
  const submit = async (itemId,action) => {
    setSubmitting(s=>({...s,[itemId]:true}));
    const result = await api("/api/review/action",{method:"POST",body:JSON.stringify({item_id:itemId,action,note:notes[itemId]||""})});
    if(result){setActions(a=>({...a,[itemId]:action}));refetch();}
    setSubmitting(s=>({...s,[itemId]:false}));
  };
  const pending = (data?.items||[]).filter(i=>!actions[i.id]).length;
  return (
    <div>
      <div style={{marginBottom:28}}><Label>Quality Gate</Label><h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Human Review</h1><p style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Review all flagged items before outputs are unlocked · Live risk data</p></div>
      <PageDescription>
        Human Review is a governance checkpoint that prevents automatic release of outputs when high-severity flags appear. Analysts approve or dismiss each item with notes, creating an auditable trail before reports can be generated.
      </PageDescription>
      {pending>0 && <div style={{background:"#140808",border:"1px solid #2a1010",borderRadius:8,padding:"14px 18px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}><span style={{color:"#e85d5d",fontSize:18}}>⚠</span><span style={{color:"#c8a0a0",fontSize:13,fontFamily:T.mono}}>{pending} item{pending>1?"s":""} pending — outputs locked</span></div>}
      {loading ? <Spinner/> : (data?.items||[]).map(item=>{
        const done=actions[item.id];
        return (
          <div key={item.id} style={{background:done==="approve"?"#080f0a":done==="dismiss"?"#0f0808":T.surface,border:`1px solid ${done==="approve"?"#1a3a28":done==="dismiss"?"#2a1010":T.border}`,borderRadius:8,padding:20,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}>
                  <Tag color={item.severity==="high"?"#e85d5d":item.severity==="medium"?"#f0a040":"#4caf82"}>{item.severity?.toUpperCase()}</Tag>
                  <span style={{fontSize:10,color:T.textDim,fontFamily:T.mono,letterSpacing:1}}>{item.type?.toUpperCase()}</span>
                  <span style={{fontSize:11,color:T.textDim}}>{item.project}</span>
                </div>
                <div style={{color:T.text,fontSize:13}}>{item.flag}</div>
              </div>
              {done==="approve" && <span style={{color:"#4caf82",fontSize:24}}>✓</span>}
              {done==="dismiss" && <span style={{color:"#e85d5d",fontSize:24}}>✗</span>}
            </div>
            <textarea placeholder="Add reviewer note (optional)…" value={notes[item.id]||""} onChange={e=>setNotes(n=>({...n,[item.id]:e.target.value}))} style={{width:"100%",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.textMid,fontSize:12,padding:"8px 12px",resize:"vertical",minHeight:48,fontFamily:T.mono,boxSizing:"border-box",marginBottom:12}}/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>submit(item.id,"approve")} disabled={!!done||submitting[item.id]} style={{padding:"8px 20px",border:"1px solid #1a3a28",background:done==="approve"?"#1a3a28":"transparent",borderRadius:6,color:"#4caf82",fontSize:11,cursor:done?"default":"pointer",fontFamily:T.mono,letterSpacing:1}}>✓ APPROVE</button>
              <button onClick={()=>submit(item.id,"dismiss")} disabled={!!done||submitting[item.id]} style={{padding:"8px 20px",border:"1px solid #2a1010",background:done==="dismiss"?"#2a1010":"transparent",borderRadius:6,color:"#e85d5d",fontSize:11,cursor:done?"default":"pointer",fontFamily:T.mono,letterSpacing:1}}>✗ DISMISS</button>
            </div>
          </div>
        );
      })}
      {!loading && pending===0 && Object.keys(actions).length>0 && (
        <div style={{background:"#080f0a",border:"1px solid #1a3a28",borderRadius:8,padding:20,textAlign:"center",marginTop:8}}>
          <div style={{color:"#4caf82",fontSize:18,fontFamily:T.serif,marginBottom:6}}>✓ All items reviewed — outputs unlocked</div>
          <div style={{color:T.textDim,fontSize:12,fontFamily:T.mono}}>Proceed to Export Outputs</div>
        </div>
      )}
    </div>
  );
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function ExportOutputs() {
  const {data:locked}    = useApi("/api/review/locked");
  const [framework,setFramework]   = useState("NAIC RBC");
  const [reportType,setReportType] = useState("Actuarial Reserve Memo");
  const [generating,setGenerating] = useState(null);
  const [done,setDone]             = useState({});
  const isLocked = locked?.locked;
  const generate = (type) => {
    if(isLocked) return;
    setGenerating(type);
    setTimeout(()=>{setGenerating(null);setDone(d=>({...d,[type]:true}));},2000);
  };
  const frameworks = ["NAIC RBC","Solvency II","Lloyd's RDS","Basel IV","TCFD","IFRS 9"];
  const reportTypes = ["Actuarial Reserve Memo","Risk Register Report","NAIC RBC Filing Package","Executive Summary","Correlation Analysis","Project Deep Dive"];
  return (
    <div>
      <div style={{marginBottom:28}}><Label>Report Generation</Label><h1 style={{fontSize:36,fontWeight:700,color:T.text,fontFamily:T.serif,margin:"4px 0"}}>Export Outputs</h1></div>
      <PageDescription>
        Export Outputs packages approved analytics into report formats for underwriting, actuarial, and compliance teams. Generation stays locked until review is complete, enforcing a controlled handoff from model results to decision-ready deliverables.
      </PageDescription>
      {isLocked && <div style={{background:"#140808",border:"1px solid #2a1010",borderRadius:8,padding:"14px 18px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}><span style={{color:"#e85d5d"}}>🔒</span><span style={{color:"#c8a0a0",fontSize:13,fontFamily:T.mono}}>{locked.pending} review item{locked.pending>1?"s":""} pending. Complete Human Review to unlock.</span></div>}
      <Card style={{marginBottom:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
          <div>
            <Label>Regulatory Framework</Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {frameworks.map(f=>(
                <button key={f} onClick={()=>setFramework(f)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${framework===f?"#4ecdc4":T.border}`,background:framework===f?"#072020":"transparent",color:framework===f?"#4ecdc4":T.textDim,fontSize:11,cursor:"pointer",fontFamily:T.mono}}>{f}</button>
              ))}
            </div>
          </div>
          <div>
            <Label>Report Type</Label>
            <select value={reportType} onChange={e=>setReportType(e.target.value)} style={{width:"100%",padding:"10px 12px",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,fontFamily:T.mono}}>
              {reportTypes.map(r=><option key={r}>{r}</option>)}
            </select>
          </div>
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        {[{type:"pdf",icon:"📄",label:"PDF Report",desc:`${reportType} · ${framework} framework`},{type:"xlsx",icon:"📊",label:"Excel Workbook",desc:"Risk register, RBC calcs, correlations, scenarios"},{type:"memo",icon:"📋",label:"Actuarial Reserve Memo",desc:"Signed memo format · NAIC compliant"},{type:"json",icon:"⟨/⟩",label:"JSON / API Export",desc:"Machine-readable · insurer/bank system ingestion"}].map(o=>(
          <Card key={o.type}>
            <div style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:16}}>
              <div style={{fontSize:28}}>{o.icon}</div>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:T.text}}>{o.label}</div>
                <div style={{fontSize:11,color:T.textDim,marginTop:4,fontFamily:T.mono,lineHeight:1.6}}>{o.desc}</div>
              </div>
            </div>
            {done[o.type]
              ? <div style={{display:"flex",gap:10}}>
                  <button style={{flex:1,padding:10,background:"#080f0a",border:"1px solid #1a3a28",borderRadius:6,color:"#4caf82",fontSize:11,cursor:"pointer",fontFamily:T.mono}}>↓ DOWNLOAD</button>
                  <button onClick={()=>setDone(d=>({...d,[o.type]:false}))} style={{padding:"10px 14px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:6,color:T.textDim,fontSize:11,cursor:"pointer"}}>↺</button>
                </div>
              : <button onClick={()=>generate(o.type)} disabled={isLocked||generating===o.type} style={{width:"100%",padding:10,background:"transparent",border:`1px solid ${isLocked?T.bg:T.border}`,borderRadius:6,color:isLocked?T.textDim:generating===o.type?T.textDim:"#4ecdc4",fontSize:11,cursor:isLocked?"not-allowed":"pointer",fontFamily:T.mono,letterSpacing:1}}>
                  {generating===o.type?"GENERATING...":isLocked?"🔒 LOCKED":"GENERATE →"}
                </button>}
          </Card>
        ))}
      </div>
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────────────────────
function App() {
  const [active,setActive]               = useState("dashboard");
  const [pipelineRunning,setPipeline]    = useState(false);
  const [reviewPending,setReviewPending] = useState(0);
  const [pv,setPv]                       = useState(0);

  useEffect(()=>{
    const poll = async()=>{ const d=await api("/api/review/items"); if(d) setReviewPending(d.pending||0); };
    poll();
    const id=setInterval(poll,30000);
    return ()=>clearInterval(id);
  },[]);

  const handleSync = async()=>{
    setPipeline(true);
    await api("/api/pipeline/run",{method:"POST"});
    setTimeout(()=>setPipeline(false),8000);
  };

  const screens = {
    "dashboard":   <Dashboard key={pv}/>,
    "add-project": <AddProject onProjectAdded={()=>setPv(v=>v+1)}/>,
    "risk-model":  <RiskModel key={pv}/>,
    "correlation": <CorrelationMatrix/>,
    "naic":        <NaicRBC key={pv}/>,
    "data-feeds":  <DataFeeds/>,
    "review":      <HumanReview/>,
    "export":      <ExportOutputs/>,
  };

  return (
    <div style={{background:T.bg,minHeight:"100vh"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:${T.bg};}
        ::-webkit-scrollbar{width:5px;height:5px;background:${T.bg};}
        ::-webkit-scrollbar-thumb{background:${T.border};border-radius:3px;}
        select option{background:${T.surface};}
        input,textarea,select{outline:none;}
        textarea::placeholder,input::placeholder{color:${T.textDim};}
        button{transition:opacity 0.12s;font-family:inherit;}
        button:hover:not(:disabled){opacity:0.8;}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:0.8;}}
      `}</style>
      <Sidebar active={active} setActive={setActive} reviewPending={reviewPending} pipelineRunning={pipelineRunning} onSync={handleSync}/>
      <main style={{marginLeft:218,padding:"40px 48px",maxWidth:1260}}>
        {screens[active]||<Dashboard/>}
      </main>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
